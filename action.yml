# action.yml
# ==========
# Green-Ops: Carbon-Aware CI/CD Test Pruner — Reusable GitHub Action
#
# USAGE in a consumer repo's workflow:
#
#   jobs:
#     greenops:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#           with:
#             fetch-depth: 0          # REQUIRED — full history for accurate diff
#
#         - uses: your-org/greenops-action@v1
#           id: greenops
#           with:
#             github_token:       ${{ secrets.GITHUB_TOKEN }}
#             anthropic_api_key:  ${{ secrets.ANTHROPIC_API_KEY }}
#             electricity_maps_key: ${{ secrets.ELECTRICITY_MAPS_KEY }}  # optional
#
#         - name: Run selected tests
#           run: ${{ steps.greenops.outputs.test_command }}

name: "Green-Ops Carbon-Aware Test Pruner"
description: >
  AI-powered CI/CD optimizer. Detects changed modules via git diff, generates
  AST + GraphCodeBERT embeddings, computes semantic similarity, runs an XGBoost
  gatekeeper trained on historical CI telemetry, and selects only the tests
  most likely to be affected — factoring in real-time carbon intensity so that
  full regression is deferred to cleaner grid windows.

# ─────────────────────────────────────────────────────────────────────────────
# INPUTS
# All repo-specific logic lives here. The Python code reads ONLY env vars.
# ─────────────────────────────────────────────────────────────────────────────
inputs:

  # ── Required ────────────────────────────────────────────────────────────────
  github_token:
    description: "GitHub token. Use secrets.GITHUB_TOKEN — never hardcode."
    required: true

  # ── ML / LLM credentials (optional — degrades gracefully without them) ──────
  anthropic_api_key:
    description: "Anthropic API key for LLM impact analysis (Claude). Optional."
    required: false
    default: ""

  electricity_maps_key:
    description: >
      Electricity Maps / CO2Signal API key for real-time carbon intensity.
      Free tier available at electricitymaps.com.
      If omitted, falls back to Ember 2024 static grid-average values.
    required: false
    default: ""

  # ── Test runner config ───────────────────────────────────────────────────────
  test_command:
    description: >
      Command used to run a single test file/suite.
      Must accept a space-separated list of test paths appended by the pruner.
      Examples: "pytest", "mvn test -Dtest=", "npx jest --testPathPattern"
    required: false
    default: "pytest"

  test_discovery_path:
    description: >
      Root directory to discover test files in.
      Pruner walks this directory for files matching test_file_pattern.
    required: false
    default: "."

  test_file_pattern:
    description: >
      Glob pattern for test file discovery (relative to test_discovery_path).
      Examples: "tests/**/test_*.py", "src/**/*Test.java", "**/*.spec.ts"
    required: false
    default: "tests/**/test_*.py"

  # ── Diff / branch config ─────────────────────────────────────────────────────
  base_branch:
    description: "Branch to diff against. Usually 'main' or 'master'."
    required: false
    default: "main"

  # ── Embedding / similarity config ────────────────────────────────────────────
  embedding_model:
    description: >
      HuggingFace model for code embeddings.
      Default: microsoft/graphcodebert-base (best for code).
      Fallback: microsoft/codebert-base (faster, lighter).
    required: false
    default: "microsoft/graphcodebert-base"

  sim_threshold:
    description: >
      Cosine similarity threshold [0–1]. Tests with similarity above this
      against a changed module are included. Lower = more tests run.
    required: false
    default: "0.65"

  # ── ML gatekeeper config ─────────────────────────────────────────────────────
  pf_threshold:
    description: >
      Probability-of-failure threshold [0–1]. XGBoost Pf above this → run test.
      Lower = more conservative (run more tests). Default: 0.30.
    required: false
    default: "0.30"

  presubmit_csv:
    description: >
      Path to presubmit_clean.csv (generated by preprocess_submit_datasets.py).
      If provided, XGBoost trains on real historical data instead of mock data.
    required: false
    default: ""

  postsubmit_csv:
    description: >
      Path to postsubmit_clean.csv.
    required: false
    default: ""

  # ── Carbon / scheduling config ────────────────────────────────────────────────
  carbon_zone:
    description: >
      Electricity Maps zone code for the CI runner's grid region.
      Examples: "IN-SO" (South India), "US-CAL-CISO" (California), "DE" (Germany).
      Run `curl https://api.electricitymap.org/v3/zones` to find your zone.
      If blank, the zone is inferred from RUNNER_REGION (AWS/Azure/GCP env var)
      or falls back to static Ember 2024 average for the region.
    required: false
    default: ""

  carbon_threshold:
    description: >
      gCO2/kWh above which only mission-critical tests run immediately;
      full regression is deferred to a cleaner grid window.
    required: false
    default: "500"

  # ── State / caching ────────────────────────────────────────────────────────────
  cache_embeddings:
    description: >
      Whether to cache module embeddings between runs using actions/cache.
      Strongly recommended — embedding 1000 files takes ~4 min on CPU.
      Set to "false" only for debugging.
    required: false
    default: "true"

  module_db_path:
    description: >
      Path where the SQLite module registry is stored (embeddings + hashes).
      Cached between runs. Change only if you want a non-default location.
    required: false
    default: ".greenops/module_registry.sqlite"

  # ── Safety / fallback config ───────────────────────────────────────────────────
  confidence_threshold:
    description: >
      If the pruner's overall confidence score falls below this value, it
      falls back to running the full test suite. Range [0–1]. Default: 0.6.
    required: false
    default: "0.60"

  fail_on_pruner_error:
    description: >
      If "true", a pruner failure causes the CI job to fail (no fallback).
      Use only when you trust the system completely. Default: false (safe fallback).
    required: false
    default: "false"

  python_version:
    description: "Python version for the pruner. 3.11 is recommended."
    required: false
    default: "3.11"

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS — consumed by subsequent steps in the caller's workflow
# ─────────────────────────────────────────────────────────────────────────────
outputs:

  test_command:
    description: "Full test command with only selected test paths appended."
    value: ${{ steps.pruner.outputs.test_command }}

  selected_tests:
    description: "Space-separated list of test files/suites selected to run."
    value: ${{ steps.pruner.outputs.selected_tests }}

  pruned_tests:
    description: "Space-separated list of tests pruned (skipped)."
    value: ${{ steps.pruner.outputs.pruned_tests }}

  pruning_rate:
    description: "Fraction of tests pruned (0.0–1.0)."
    value: ${{ steps.pruner.outputs.pruning_rate }}

  carbon_intensity:
    description: "Observed carbon intensity (gCO2/kWh) at decision time."
    value: ${{ steps.pruner.outputs.carbon_intensity }}

  carbon_saved_grams:
    description: "Estimated gCO2 saved by pruning."
    value: ${{ steps.pruner.outputs.carbon_saved_grams }}

  time_saved_seconds:
    description: "Estimated CI time saved (seconds) by pruning."
    value: ${{ steps.pruner.outputs.time_saved_seconds }}

  strategy:
    description: >
      Scheduling strategy used: FULL_RUN | SELECTIVE | DEFERRED | FALLBACK.
    value: ${{ steps.pruner.outputs.strategy }}

  confidence:
    description: "Pruner confidence score (0.0–1.0)."
    value: ${{ steps.pruner.outputs.confidence }}

  matrix:
    description: "GitHub Actions matrix JSON for parallelised test execution."
    value: ${{ steps.pruner.outputs.matrix }}

# ─────────────────────────────────────────────────────────────────────────────
# STEPS
# ─────────────────────────────────────────────────────────────────────────────
runs:
  using: "composite"
  steps:

    # ── 1. Python setup ────────────────────────────────────────────────────────
    - name: Set up Python ${{ inputs.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    # ── 2. Pip cache (speeds up repeated runs significantly) ───────────────────
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: greenops-pip-${{ runner.os }}-py${{ inputs.python_version }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          greenops-pip-${{ runner.os }}-py${{ inputs.python_version }}-

    # ── 3. Module embedding cache ──────────────────────────────────────────────
    #    This is the most expensive step — skip recomputing if modules unchanged.
    - name: Cache module embeddings
      if: inputs.cache_embeddings == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.module_db_path }}
        # Key includes the commit SHA of the base branch so cache invalidates
        # when the codebase changes meaningfully.
        key: greenops-embeddings-${{ runner.os }}-${{ github.base_ref }}-${{ github.event.pull_request.base.sha }}
        restore-keys: |
          greenops-embeddings-${{ runner.os }}-${{ github.base_ref }}-

    # ── 4. Install Python dependencies ────────────────────────────────────────
    - name: Install Green-Ops dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        # Install from the action's own requirements.txt
        ACTION_DIR="${{ github.action_path }}"
        if [ -f "$ACTION_DIR/requirements.txt" ]; then
          pip install -r "$ACTION_DIR/requirements.txt"
        fi
        # Also install any repo-level requirements
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi

    # ── 5. Fetch full git history for accurate diff ────────────────────────────
    #    action.yml consumers must use fetch-depth: 0 in checkout,
    #    but we also ensure the base branch ref is available here.
    - name: Ensure base branch ref is available
      shell: bash
      run: |
        git fetch origin ${{ inputs.base_branch }} --depth=50 2>/dev/null || true

    # ── 6. Run the Green-Ops pruning pipeline ─────────────────────────────────
    - name: Run Green-Ops test pruner
      id: pruner
      shell: bash
      env:
        # Auth
        GITHUB_TOKEN:               ${{ inputs.github_token }}
        ANTHROPIC_API_KEY:          ${{ inputs.anthropic_api_key }}
        ELECTRICITY_MAPS_KEY:       ${{ inputs.electricity_maps_key }}
        CO2SIGNAL_API_KEY:          ${{ inputs.electricity_maps_key }}   # same key, both env vars

        # Repo context — injected by Actions automatically, no hardcoding
        REPO_NAME:                  ${{ github.repository }}
        PR_NUMBER:                  ${{ github.event.pull_request.number }}
        BASE_BRANCH:                ${{ inputs.base_branch }}
        BASE_SHA:                   ${{ github.event.pull_request.base.sha }}
        HEAD_SHA:                   ${{ github.event.pull_request.head.sha }}

        # Test runner config
        GREENOPS_TEST_COMMAND:      ${{ inputs.test_command }}
        GREENOPS_TEST_DISCOVERY:    ${{ inputs.test_discovery_path }}
        GREENOPS_TEST_PATTERN:      ${{ inputs.test_file_pattern }}

        # ML config
        GREENOPS_EMBEDDING_MODEL:   ${{ inputs.embedding_model }}
        GREENOPS_SIM_THRESHOLD:     ${{ inputs.sim_threshold }}
        PF_THRESHOLD:               ${{ inputs.pf_threshold }}
        GREENOPS_PRESUBMIT_CSV:     ${{ inputs.presubmit_csv }}
        GREENOPS_POSTSUBMIT_CSV:    ${{ inputs.postsubmit_csv }}

        # Carbon config
        GREENOPS_CARBON_ZONE:       ${{ inputs.carbon_zone }}
        GREENOPS_CARBON_THRESHOLD:  ${{ inputs.carbon_threshold }}

        # Storage
        GREENOPS_MODULE_DB:         ${{ inputs.module_db_path }}
        GREENOPS_OUTPUT:            .greenops/output

        # Safety
        GREENOPS_CONFIDENCE_MIN:    ${{ inputs.confidence_threshold }}
        GREENOPS_FAIL_ON_ERROR:     ${{ inputs.fail_on_pruner_error }}

        # Runner region — used to infer carbon zone if not explicitly set
        # GitHub Actions sets RUNNER_REGION automatically for hosted runners.
        RUNNER_REGION:              ${{ env.RUNNER_REGION }}

        # Tell pipeline it's running inside Actions (enables Actions-specific output)
        GITHUB_ACTIONS:             "true"

      run: |
        ACTION_DIR="${{ github.action_path }}"
        python "$ACTION_DIR/pipeline_runner.py" \
          --repo    "$REPO_NAME" \
          --pr      "$PR_NUMBER" \
          --base    "$BASE_BRANCH" \
          --output  ".greenops/output"

    # ── 7. Fallback: run full test suite if pruner failed ──────────────────────
    - name: Fallback — run full test suite
      if: failure() && inputs.fail_on_pruner_error == 'false'
      shell: bash
      run: |
        echo "::warning::Green-Ops pruner encountered an error. Running full test suite as fallback."
        echo "::warning::Check .greenops/output/pipeline.log for details."
        ${{ inputs.test_command }}

    # ── 8. Upload pipeline artifacts (always, for debugging + audit) ───────────
    - name: Upload Green-Ops artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: greenops-pr${{ github.event.pull_request.number }}-${{ github.run_id }}
        path: |
          .greenops/output/pruning_decision.json
          .greenops/output/test_schedule.json
          .greenops/output/impact_analysis.json
          .greenops/output/eda_report.txt
          .greenops/output/pipeline.log
        retention-days: 14
        if-no-files-found: warn
